name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: laravel_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d laravel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: laravel_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync

    steps:
      - uses: actions/checkout@v4

      # ✅ Setup PHP ONCE
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, bcmath, pdo, pdo_pgsql, xml

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      # ✅ Laravel setup (MISSING BEFORE)
      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            php -r "@\$pdo=new PDO('pgsql:host=127.0.0.1;port=5432;dbname=laravel_test','postgres','postgres'); echo 'ok'; exit(0);" && exit 0 || sleep 3
          done
          exit 1

      - name: Run migrations
        run: php artisan migrate:fresh --force

      - name: Run backend tests
        run: vendor/bin/phpunit --configuration phpunit.ci.xml

---

  ci-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [8.4]
        node: [22]

    env:
      APP_ENV: testing
      APP_URL: http://localhost

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, sqlite

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Prepare SQLite
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test

      - name: Composer audit
        run: composer audit

      - name: NPM audit
        run: npm audit --audit-level=moderate

      - name: Security scan
        uses: aquasecurity/trivy-action@v0.14.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table